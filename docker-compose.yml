services:
  metadata-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mayfly
      POSTGRES_PASSWORD: ${MAYFLY_DB_PASSWORD:-mayfly}
      POSTGRES_DB: mayfly
    volumes:
      - metadata:/var/lib/postgresql/data
    networks:
      - mayfly-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mayfly -d mayfly"]
      interval: 5s
      timeout: 5s
      retries: 12

  provisioner:
    build:
      context: .
      dockerfile: MayFly.Provisioner/Dockerfile
    environment:
      Provisioner__Key: "${PROVISIONER_KEY:?set a provisioner key}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - mayfly-internal
    # provisioner is intentionally NOT on mayfly-users: it does not connect to user DBs directly

  # api is NOT published to the host — only caddy exposes 80/443.
  # This is what makes trusting RFC1918 X-Forwarded-For safe.
  api:
    build:
      context: .
      dockerfile: MayFly.Api/Dockerfile
    environment:
      ConnectionStrings__Metadata: "Host=metadata-db;Database=mayfly;Username=mayfly;Password=${MAYFLY_DB_PASSWORD:-mayfly}"
      Provisioner__BaseUrl: "http://provisioner:8080"
      Provisioner__Key: "${PROVISIONER_KEY:?set a provisioner key}"
      PublicHost: "${PUBLIC_HOST:-localhost}"
    depends_on:
      metadata-db:
        condition: service_healthy
      provisioner:
        condition: service_started
    volumes:
      - dpkeys:/keys
    networks:
      - mayfly-internal
      - mayfly-users  # reaches user DB containers for query execution

  web:
    build:
      context: .
      dockerfile: MayFly.Web/Dockerfile
    networks:
      - mayfly-internal
    # No host ports published — only caddy exposes 80 to the host

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
    depends_on:
      - api
      - web
    networks:
      - mayfly-internal

volumes:
  metadata: {}
  dpkeys: {}

networks:
  mayfly-internal:
    driver: bridge
    # Pin the network name so compose services share the same network object
    name: mayfly-internal

  mayfly-users:
    driver: bridge
    internal: true   # No gateway → user DB containers cannot reach the internet
    name: mayfly-users

  mayfly-ingress:
    driver: bridge
    name: mayfly-ingress
